<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link rel="stylesheet" href="/src/styles.css">
    <title>AI Μηχανογραφικό 2026</title>
    <meta name="description" content="Υπολογίστε τα μόρια σας για τις Πανελλήνιες 2026, δείτε στατιστικά και λάβετε προβλέψεις βάσεων χρησιμοποιώντας AI.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="manifest" href="/manifest.json">
    
</head>
<body>
<nav class="top-navbar">
    <div class="navbar-container">
        <a href="index.html" class="nav-logo">Panhellenic</a>
        <div class="nav-links" id="navLinks">
            <a href="field.html?id=1">1ο Πεδίο</a>
            <a href="field.html?id=2">2ο Πεδίο</a>
            <a href="field.html?id=3">3ο Πεδίο</a>
            <a href="field.html?id=4">4ο Πεδίο</a>
            <a href="strategy.html" id="aiStrategyBtn" class="ai-strategy-link" style="display:none;">🤖 AI Μηχανογραφικό</a>
            <div class="auth-links" id="authLinks">
                <button id="loginModalBtn" class="btn-sm btn-outline-primary">Σύνδεση</button>
                <button id="registerModalBtn" class="btn-sm btn-primary">Εγγραφή</button>
                
                <div class="user-dropdown" id="userDropdown" style="display:none;">
                    <button class="user-dropdown-toggle" id="userDropdownToggle">
                        <span id="userDisplay" class="user-display"></span>
                        <span class="dropdown-arrow">▼</span>
                    </button>
                    <div class="dropdown-menu" id="userDropdownMenu">
                        <a href="profile.html" id="profileModalBtn" class="dropdown-item">👤 Προφίλ</a>
                        <button id="adminModalBtn" class="dropdown-item" style="display:none;">🛡️ Admin</button>
                        <div class="mobile-divider"></div>
                        <button id="logoutBtn" class="dropdown-item text-danger">Αποσύνδεση</button>
                    </div>
                </div>

                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" style="background:none; border:none; font-size:1.25rem; cursor:pointer; padding:0.25rem; margin-left: 0.5rem;">🌙</button>
            </div>
        </div>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</nav>

<!-- Modals from original setup (we need auth modals for login state) -->
<div id="loginModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.4);">
    <div class="modal-content card" style="background-color: var(--surface); margin: 15% auto; padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; position: relative;">
        <span id="closeLogin" style="color: var(--text-muted); float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <h2 style="margin-top:0; color: var(--text-main);">Σύνδεση</h2>
        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:0.75rem; margin-bottom:1rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
        <div style="position:relative; margin-bottom:1rem;">
            <input type="password" id="loginPassword" placeholder="Κωδικός" style="width:100%; padding:0.75rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
            <span id="toggleLoginPassword" style="position:absolute; right:10px; top:12px; cursor:pointer; font-size: 1.2rem;">👁️</span>
        </div>
        <button id="doLoginBtn" class="primary-btn" style="width:100%; padding:0.75rem;">Είσοδος</button>
    </div>
</div>

<div id="registerModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.4);">
    <div class="modal-content card" style="background-color: var(--surface); margin: 15% auto; padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; position: relative;">
        <span id="closeRegister" style="color: var(--text-muted); float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <h2 style="margin-top:0; color: var(--text-main);">Εγγραφή</h2>
        <input type="email" id="regEmail" placeholder="Email" style="width:100%; padding:0.75rem; margin-bottom:1rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
        <div style="position:relative; margin-bottom:1rem;">
            <input type="password" id="regPassword" placeholder="Κωδικός" style="width:100%; padding:0.75rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
            <span id="toggleRegPassword" style="position:absolute; right:10px; top:12px; cursor:pointer; font-size: 1.2rem;">👁️</span>
        </div>
        <button id="doRegisterBtn" class="primary-btn" style="width:100%; padding:0.75rem;">Δημιουργία Λογαριασμού</button>
    </div>
</div>


<main class="container" style="margin-top: 3rem;">
    <h1 style="margin-bottom: 2rem; text-align: center; color: var(--text-main);">🤖 Προσωπικό AI Μηχανογραφικό</h1>
    
    <!-- Strategy Inputs (Will be hidden on print) -->
    <div class="card strategy-inputs" style="margin-bottom: 2rem; border: 1px solid var(--border);">
        <h2 style="margin-top:0; color:var(--primary); font-size:1.25rem;">Ρυθμίσεις & Βαθμολογίες</h2>
        
        <div class="grid" style="margin-top: 1.5rem;">
            <div>
                <label style="font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; display: block;">Πεδίο Σπουδών</label>
                <select id="stratFieldSelect" style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-size: 1rem;">
                    <option value="1">1ο Πεδίο (Ανθρωπιστικές)</option>
                    <option value="2">2ο Πεδίο (Θετικές)</option>
                    <option value="3">3ο Πεδίο (Υγείας)</option>
                    <option value="4">4ο Πεδίο (Οικονομία/Πληρ.)</option>
                </select>
                <button type="button" id="stratImportGradesBtn" class="btn-sm btn-outline-primary" style="margin-top: 0.5rem; width: 100%;">📥 Φόρτωση Αποθηκευμένων Βαθμών</button>
            </div>
            <div>
                <label style="font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; display: block;">Πόλεις Προτίμησης (Προαιρετικό)</label>
                <input id="stratCities" type="text" style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-size: 1rem;" placeholder="π.χ. Αθήνα, Πάτρα">
            </div>
        </div>

        <div id="gradesContainer" class="grid" style="margin-top: 1.5rem;">
            <!-- Grades will be dynamically injected here based on field selection -->
        </div>

        <div style="margin-top: 2rem;">
            <label style="font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; display: block;">📝 Περιγράψε ελεύθερα τι ψάχνεις</label>
            <textarea id="stratSemanticText" rows="4" style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-size: 1rem; resize: vertical;" placeholder="π.χ. Κάτι με χημεία και επιχειρηματικότητα αλλά και κοινωνικό αντίκτυπο..."></textarea>
        </div>

        <button type="button" id="stratGenerateBtn" class="primary-btn" style="width:100%; margin-top:2rem; padding: 1rem; font-size: 1.1rem; font-weight: 600; border-radius: 8px;">Δημιουργία Στρατηγικής</button>
    </div>

    <!-- Action Bar (Hidden until generated, hidden on print) -->
    <div id="stratActionBar" class="action-bar" style="display:none; justify-content: flex-end; gap: 1rem; margin-bottom: 1.5rem;">
        <button id="printBtn" class="btn-sm btn-outline-primary" style="padding: 0.75rem 1.25rem;">🖨️ Εκτύπωση</button>
    </div>

    <!-- Results Dashboard (Will be exported/printed) -->
    <div id="stratResultsDashboard" style="display:none;">
        <div id="stratAiSummary" class="card" style="margin-bottom: 2rem; background: var(--bg-color); border: 2px solid var(--primary);">
            <!-- AI Text injected here -->
        </div>

        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
            <div id="stratReachCards" class="card" style="border-top: 4px solid var(--primary);">
                <h3 style="color: var(--primary); margin-top:0;">🎯 Όνειρο (Reach)</h3>
                <div class="schools-list"></div>
            </div>
            
            <div id="stratTargetCards" class="card" style="border-top: 4px solid #10B981;">
                <h3 style="color: #10B981; margin-top:0;">✅ Εφικτές (Target)</h3>
                <div class="schools-list"></div>
            </div>
            
            <div id="stratSafetyCards" class="card" style="border-top: 4px solid #3B82F6;">
                <h3 style="color: #3B82F6; margin-top:0;">🛡️ Ασφαλείς (Safety)</h3>
                <div class="schools-list"></div>
            </div>
        </div>
    </div>
</main>
<script>
    document.getElementById('hamburgerBtn').addEventListener('click', function() {
        document.getElementById('navLinks').classList.toggle('active');
        this.classList.toggle('active');
    });
    
    // Auth password toggles
    document.getElementById('toggleLoginPassword')?.addEventListener('click', function() {
        const input = document.getElementById('loginPassword');
        if (input.type === 'password') { input.type = 'text'; this.textContent = '🔒'; }
        else { input.type = 'password'; this.textContent = '👁️'; }
    });
    document.getElementById('toggleRegPassword')?.addEventListener('click', function() {
        const input = document.getElementById('regPassword');
        if (input.type === 'password') { input.type = 'text'; this.textContent = '🔒'; }
        else { input.type = 'password'; this.textContent = '👁️'; }
    });

    document.addEventListener('DOMContentLoaded', () => {
        const themeBtn = document.getElementById('themeToggle');
        if (!themeBtn) return;
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    });
</script>
<!-- Back to Top Button -->
<div id="backToTop" class="back-to-top">
    <svg class="progress-ring" width="50" height="50">
        <circle class="progress-ring-circle-bg" stroke="var(--border)" stroke-width="3" fill="transparent" r="22" cx="25" cy="25"/>
        <circle class="progress-ring-circle" stroke="var(--accent-neon)" stroke-width="3" fill="transparent" r="22" cx="25" cy="25"/>
    </svg>
    <span class="back-to-top-icon">▲</span>
</div>

<script type="module" src="/src/strategy.js"></script>
</body>
</html>
