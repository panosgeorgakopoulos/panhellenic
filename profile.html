<!DOCTYPE html>
<html lang="el" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Προφίλ - Πανελλήνιες 2026</title>
    <meta name="description" content="Υπολογίστε τα μόρια σας για τις Πανελλήνιες 2026, δείτε στατιστικά και λάβετε προβλέψεις βάσεων χρησιμοποιώντας AI.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/src/styles.css">
    <script type="module" src="/src/profile.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

<nav class="top-navbar">
    <div class="navbar-container">
        <a href="index.html" class="nav-logo">Panhellenic</a>
        <div class="nav-links" id="navLinks">
            <a href="field.html?id=1">1ο Πεδίο</a>
            <a href="field.html?id=2">2ο Πεδίο</a>
            <a href="field.html?id=3">3ο Πεδίο</a>
            <a href="field.html?id=4">4ο Πεδίο</a>
            <a href="strategy.html" id="aiStrategyBtn" class="ai-strategy-link" style="display:none;">🤖 AI Μηχανογραφικό</a>
            <div class="auth-links" id="authLinks">
                <button id="loginModalBtn" class="btn-sm btn-outline-primary">Σύνδεση</button>
                <button id="registerModalBtn" class="btn-sm btn-primary">Εγγραφή</button>
                
                <div class="user-dropdown" id="userDropdown" style="display:none;">
                    <button class="user-dropdown-toggle" id="userDropdownToggle">
                        <span id="userDisplay" class="user-display"></span>
                        <span class="dropdown-arrow">▼</span>
                    </button>
                    <div class="dropdown-menu" id="userDropdownMenu">
                        <a href="profile.html" id="profileModalBtn" class="dropdown-item">👤 Προφίλ</a>
                        <button id="adminModalBtn" class="dropdown-item" style="display:none;">🛡️ Admin</button>
                        <div class="mobile-divider"></div>
                        <button id="logoutBtn" class="dropdown-item text-danger">Αποσύνδεση</button>
                    </div>
                </div>

                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" style="background:none; border:none; font-size:1.25rem; cursor:pointer; padding:0.25rem; margin-left: 0.5rem;">🌙</button>
            </div>
        </div>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</nav>

<main class="container" style="margin-top: 3rem;">
    <h1 style="margin-bottom: 2rem; text-align: center; color: var(--text-main);">Το Προφίλ μου</h1>
    
    <div class="card" style="max-width: 600px; margin: 0 auto; padding: 2.5rem; border-radius: 12px; background-color: var(--surface); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);">
        <div class="input-group">
            <label style="font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; display: block;">Email (Μόνο για ανάγνωση)</label>
            <input type="text" id="profileEmail" disabled style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-muted); font-size: 1rem; cursor: not-allowed;">
        </div>
        <div class="input-group" style="margin-top:1.25rem;">
            <label style="font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; display: block;">Ονοματεπώνυμο</label>
            <input type="text" id="profileName" style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-size: 1rem; transition: border-color 0.2s, box-shadow 0.2s;" placeholder="Εισάγετε το όνομά σας">
        </div>
        <button id="profileSaveBtn" class="primary-btn" style="width:100%; margin-top:1.5rem; padding: 0.875rem; font-size: 1.05rem; font-weight: 600; border-radius: 8px;">Αποθήκευση Αλλαγών Προφίλ</button>
    </div>

    <div style="max-width: 600px; margin: 3rem auto 0;">
        <h3 style="color: var(--primary); margin-top: 0; margin-bottom: 1.5rem; text-align: center; font-size: 1.5rem;">Αποθηκευμένες Βαθμολογίες</h3>
        <div id="savedGradesContainer">
            <p style="text-align: center; color: var(--text-muted);">Φόρτωση...</p>
        </div>
    </div>
</main>

<!-- Modals from original setup (we need auth modals for login state) -->
<div id="loginModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.4);">
    <div class="modal-content card" style="background-color: var(--surface); margin: 15% auto; padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; position: relative;">
        <span id="closeLogin" style="color: var(--text-muted); float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <h2 style="margin-top:0; color: var(--text-main);">Σύνδεση</h2>
        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:0.75rem; margin-bottom:1rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
        <div style="position:relative; margin-bottom:1rem;">
            <input type="password" id="loginPassword" placeholder="Κωδικός" style="width:100%; padding:0.75rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
            <span id="toggleLoginPassword" style="position:absolute; right:10px; top:12px; cursor:pointer; font-size: 1.2rem;">👁️</span>
        </div>
        <button id="doLoginBtn" class="primary-btn" style="width:100%; padding:0.75rem;">Είσοδος</button>
    </div>
</div>

<div id="registerModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.4);">
    <div class="modal-content card" style="background-color: var(--surface); margin: 15% auto; padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; position: relative;">
        <span id="closeRegister" style="color: var(--text-muted); float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <h2 style="margin-top:0; color: var(--text-main);">Εγγραφή</h2>
        <input type="email" id="regEmail" placeholder="Email" style="width:100%; padding:0.75rem; margin-bottom:1rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
        <div style="position:relative; margin-bottom:1rem;">
            <input type="password" id="regPassword" placeholder="Κωδικός" style="width:100%; padding:0.75rem; border-radius:4px; border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
            <span id="toggleRegPassword" style="position:absolute; right:10px; top:12px; cursor:pointer; font-size: 1.2rem;">👁️</span>
        </div>
        <button id="doRegisterBtn" class="primary-btn" style="width:100%; padding:0.75rem;">Εγγραφή</button>
    </div>
</div>

<script>
    document.getElementById('hamburgerBtn').addEventListener('click', function() {
        document.getElementById('navLinks').classList.toggle('active');
        this.classList.toggle('active');
    });

    document.addEventListener('DOMContentLoaded', () => {
        const themeBtn = document.getElementById('themeToggle');
        if (!themeBtn) return;
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    });
</script>

</body>
</html>
